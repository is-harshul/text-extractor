name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macos-arm64
            os: macos-14
            rust-target: aarch64-apple-darwin
            tauri-args: '--target aarch64-apple-darwin --bundles dmg'
          - name: macos-intel
            os: macos-13
            rust-target: x86_64-apple-darwin
            tauri-args: '--target x86_64-apple-darwin --bundles dmg'
          - name: linux
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            tauri-args: '--bundles deb,appimage'
          - name: windows
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            tauri-args: '--bundles msi,nsis'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # --- platform deps ---
      - name: Install Linux deps
        if: matrix.platform.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            libtesseract-dev libleptonica-dev clang \
            libpipewire-0.3-dev libdbus-1-dev \
            build-essential curl wget file libssl-dev

      - name: Install macOS deps
        if: startsWith(matrix.platform.name, 'macos')
        run: brew install tesseract leptonica

      - name: Install Windows deps (vcpkg tesseract)
        if: matrix.platform.name == 'windows'
        shell: bash
        run: |
          vcpkg install tesseract:x64-windows leptonica:x64-windows
          echo "VCPKGRS_DYNAMIC=1" >> $GITHUB_ENV
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: npm install
        run: npm ci

      - name: tauri build
        run: npx tauri build ${{ matrix.platform.tauri-args }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release
          find src-tauri/target -type f \
            \( -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" \
               -o -name "*.msi" -o -name "*-setup.exe" \) \
            -exec cp -v {} release/ \;
          ls -lh release/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform.name }}
          path: release/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create / update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          ls -lh dist/
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "Text Extractor $TAG" \
              --generate-notes \
              --notes "macOS users: right-click → Open on first launch (unsigned build)."
          fi
